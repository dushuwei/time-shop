<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时光杂货铺 - 增强版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #2c2416 0%, #3d3326 100%);
            color: #f5f5dc;
            overflow-x: hidden;
        }

        /* 动态背景粒子效果 */
        #particles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            animation: float 10s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(50px); }
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        /* 主菜单增强 */
        #main-menu {
            text-align: center;
            animation: fadeIn 0.5s;
        }

        #main-menu h1 {
            font-size: 5rem;
            margin-bottom: 1rem;
            color: #ffd700;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5), 0 0 30px rgba(255,215,0,0.3);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 3px 3px 6px rgba(0,0,0,0.5), 0 0 30px rgba(255,215,0,0.3); }
            to { text-shadow: 3px 3px 6px rgba(0,0,0,0.5), 0 0 50px rgba(255,215,0,0.6); }
        }

        #main-menu h2 {
            font-size: 1.8rem;
            margin-bottom: 3rem;
            color: #daa520;
            font-style: italic;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            align-items: center;
        }

        button {
            padding: 1.2rem 3.5rem;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #8b6914 0%, #daa520 100%);
            color: white;
            border: 3px solid #ffd700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 350px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        button:hover::before {
            width: 400px;
            height: 400px;
        }

        button:hover {
            background: linear-gradient(135deg, #daa520 0%, #ffd700 100%);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255,215,0,0.5);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 商店界面增强 */
        #shop {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        #shop.active {
            display: flex;
        }

        /* 顶部信息栏增强 */
        .top-bar {
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.5) 100%);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 3px solid #ffd700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .stat {
            font-size: 1.6rem;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-icon {
            font-size: 2rem;
        }

        /* 主游戏区域 */
        .game-area {
            flex: 1;
            display: flex;
            padding: 2rem;
            gap: 2rem;
            overflow: hidden;
        }

        /* 左侧 - 顾客区域增强 */
        .customer-area {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .customer-portrait {
            background: linear-gradient(135deg, rgba(0,0,0,0.4) 0%, rgba(50,40,20,0.3) 100%);
            border: 3px solid #daa520;
            border-radius: 15px;
            padding: 2.5rem;
            text-align: center;
            min-height: 250px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .customer-portrait::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .customer-avatar {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .customer-name {
            font-size: 2.5rem;
            color: #ffd700;
            margin-bottom: 0.8rem;
            position: relative;
            z-index: 1;
        }

        .customer-era {
            font-size: 1.3rem;
            color: #daa520;
            font-style: italic;
            position: relative;
            z-index: 1;
        }

        /* 对话框增强 */
        .dialogue-box {
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(20,15,10,0.7) 100%);
            border: 3px solid #daa520;
            border-radius: 15px;
            padding: 2.5rem;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            position: relative;
        }

        .dialogue-text {
            font-size: 1.5rem;
            line-height: 2;
            margin-bottom: 1.5rem;
            animation: typewriter 0.5s steps(40);
        }

        @keyframes typewriter {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .dialogue-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .dialogue-buttons button {
            min-width: 150px;
            padding: 1rem 2rem;
            font-size: 1.3rem;
        }

        /* 右侧面板增强 */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            max-height: 100%;
            overflow-y: auto;
        }

        .panel {
            background: linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(30,25,15,0.5) 100%);
            border: 3px solid #daa520;
            border-radius: 15px;
            padding: 1.8rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .panel h3 {
            color: #ffd700;
            font-size: 1.8rem;
            margin-bottom: 1.2rem;
            border-bottom: 2px solid #daa520;
            padding-bottom: 0.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .inventory-grid::-webkit-scrollbar {
            width: 8px;
        }

        .inventory-grid::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
        }

        .inventory-grid::-webkit-scrollbar-thumb {
            background: #8b6914;
            border-radius: 4px;
        }

        .item-button {
            background: linear-gradient(135deg, #4a3a1a 0%, #6b5a2a 100%);
            border: 2px solid #8b6914;
            color: #f5f5dc;
            padding: 1.2rem;
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .item-button:hover {
            background: linear-gradient(135deg, #6b5a2a 0%, #8b6914 100%);
            border-color: #daa520;
            transform: translateX(8px);
            box-shadow: 0 4px 12px rgba(218, 165, 32, 0.3);
        }

        .item-icon {
            font-size: 2rem;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: bold;
            color: #ffd700;
            font-size: 1.1rem;
        }

        .item-quantity {
            color: #daa520;
            font-size: 0.95rem;
        }

        .rarity-common { border-left: 4px solid #ffffff; }
        .rarity-uncommon { border-left: 4px solid #00ff00; }
        .rarity-rare { border-left: 4px solid #0080ff; }
        .rarity-legendary { border-left: 4px solid #ff8000; }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .controls button {
            min-width: auto;
            padding: 1rem;
            font-size: 1.2rem;
        }

        /* 成就系统 */
        .achievement-popup {
            position: fixed;
            top: 100px;
            right: -400px;
            background: linear-gradient(135deg, #1a472a 0%, #2d7a4a 100%);
            border: 3px solid #4ade80;
            border-radius: 12px;
            padding: 1.5rem;
            min-width: 350px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.7);
            animation: slideIn 0.5s forwards, slideOut 0.5s 3s forwards;
            z-index: 2000;
        }

        @keyframes slideIn {
            to { right: 20px; }
        }

        @keyframes slideOut {
            to { right: -400px; }
        }

        .achievement-popup h3 {
            color: #ffd700;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .achievement-popup p {
            color: #f0f0f0;
            font-size: 1.1rem;
        }

        /* 神秘商人界面 */
        .merchant-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1500;
            animation: fadeIn 0.3s;
        }

        .merchant-panel {
            background: linear-gradient(135deg, #2c1810 0%, #4a3020 100%);
            border: 4px solid #ffd700;
            border-radius: 20px;
            padding: 3rem;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(255,215,0,0.5);
        }

        .merchant-panel h2 {
            color: #ffd700;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .merchant-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .merchant-item {
            background: rgba(0,0,0,0.5);
            border: 2px solid #daa520;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }

        .merchant-item button {
            margin-top: 1rem;
            min-width: auto;
            width: 100%;
        }

        /* 商店升级界面 */
        .upgrade-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .upgrade-card {
            background: rgba(0,0,0,0.4);
            border: 2px solid #8b6914;
            border-radius: 10px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upgrade-card.purchased {
            border-color: #4ade80;
            opacity: 0.6;
        }

        /* 消息提示增强 */
        .success-message, .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 2.5rem 5rem;
            border-radius: 15px;
            font-size: 2.2rem;
            animation: popIn 0.3s;
            z-index: 2000;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .success-message {
            background: linear-gradient(135deg, #1a472a 0%, #2d7a4a 100%);
            border: 3px solid #4ade80;
            color: #fff;
        }

        .error-message {
            background: linear-gradient(135deg, #4a1a1a 0%, #7a2d2d 100%);
            border: 3px solid #ff6b6b;
            color: #fff;
        }

        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* 响应式设计 */
        @media (max-width: 1400px) {
            .game-area {
                flex-direction: column;
            }
            .right-panel {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .panel {
                flex: 1;
                min-width: 300px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 故事收集册 */
        .story-book {
            max-height: 500px;
            overflow-y: auto;
        }

        .story-item {
            background: rgba(0,0,0,0.3);
            border-left: 4px solid #ffd700;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
        }

        .story-item h4 {
            color: #ffd700;
            margin-bottom: 0.5rem;
        }

        .story-item.locked {
            opacity: 0.5;
            border-left-color: #666;
        }
    </style>
</head>
<body>
    <div id="particles"></div>

    <div id="game-container">
        <!-- 主菜单 -->
        <div id="main-menu">
            <h1>⏰ 时光杂货铺 ⏰</h1>
            <h2>Time Shop Game - Enhanced Edition</h2>
            <div class="menu-buttons">
                <button onclick="startNewGame()">🎮 开始游戏</button>
                <button id="continue-btn" onclick="continueGame()" disabled>📖 继续游戏</button>
                <button onclick="showStoryBook()">📚 故事收集册</button>
                <button onclick="showAchievements()">🏆 成就</button>
                <button onclick="toggleSound()">🔊 音效: <span id="sound-status">开启</span></button>
            </div>
        </div>

        <!-- 商店界面 -->
        <div id="shop">
            <div class="top-bar">
                <div class="stat">
                    <span class="stat-icon">💰</span>
                    <span>金钱: $<span id="money">100</span></span>
                </div>
                <div class="stat">
                    <span class="stat-icon">📅</span>
                    <span>第 <span id="day">1</span> 天</span>
                </div>
                <div class="stat">
                    <span class="stat-icon">⭐</span>
                    <span>声望: <span id="reputation">0</span></span>
                </div>
                <div class="stat">
                    <span class="stat-icon">📖</span>
                    <span>故事: <span id="stories">0</span>/20</span>
                </div>
            </div>

            <div class="game-area">
                <div class="customer-area">
                    <div class="customer-portrait" id="customer-portrait">
                        <div class="customer-avatar" id="customer-avatar">⏰</div>
                        <div class="customer-name" id="customer-name">等待顾客...</div>
                        <div class="customer-era" id="customer-era"></div>
                    </div>

                    <div class="dialogue-box">
                        <div class="dialogue-text" id="dialogue-text">
                            欢迎来到时光杂货铺！这里收藏着来自不同时代的珍贵物品...
                        </div>
                        <div class="dialogue-buttons">
                            <button onclick="nextDialogue()">继续 ➡️</button>
                        </div>
                    </div>
                </div>

                <div class="right-panel">
                    <div class="panel">
                        <h3>📦 库存</h3>
                        <div class="inventory-grid" id="inventory"></div>
                    </div>

                    <div class="panel">
                        <h3>🎮 操作</h3>
                        <div class="controls">
                            <button onclick="nextDay()">🌅 下一天</button>
                            <button onclick="openMerchant()">🧙 呼叫商人</button>
                            <button onclick="showUpgrades()">🏪 商店升级</button>
                            <button onclick="saveGame()">💾 保存游戏</button>
                            <button onclick="backToMenu()">🏠 返回菜单</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
    <script src="game_enhanced.js"></script>
    <script>
        // 创建背景粒子
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 5) + 's';
                container.appendChild(particle);
            }
        }

        window.onload = function() {
            createParticles();
            initGame();
        };
    </script>
</body>
</html>
